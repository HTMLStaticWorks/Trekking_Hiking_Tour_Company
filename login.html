<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In | Trekking & Hiking Tour Company</title>
  <meta name="description" content="Log in to your TrekX account to access your adventure portal and view bookings.">
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .signup-section {
      padding: 150px 0 100px;
      min-height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('images/hero/hero-4.png') center/cover fixed;
      display: flex;
      align-items: center;
    }
    
    .signup-box {
      background: var(--bg-color);
      border-radius: 20px;
      padding: 50px;
      max-width: 600px;
      margin: 0 auto;
      box-shadow: var(--shadow-premium);
    }
    
    .login-link {
      text-align: center;
      margin-top: 20px;
    }
    
    .login-link a {
      color: var(--accent-color);
      font-weight: 600;
    }
    
    .form-control.password-input {
      padding-right: 45px;
    }
    
    .password-toggle:hover {
      color: var(--primary-color) !important;
    }
    
    .social-auth-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--surface-color);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      font-size: 1.2rem;
      transition: all var(--transition-smooth);
      box-shadow: var(--shadow-sm);
    }
    
    .social-auth-btn:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
      color: #FFF;
    }
    
    .social-auth-btn.google-btn:hover {
      background: #EA4335;
      border-color: #EA4335;
    }
    
    .social-auth-btn.apple-btn:hover {
      background: #111111;
      border-color: #111111;
    }
    
    .dark-mode .social-auth-btn.apple-btn:hover {
      background: #FFFFFF;
      color: #111111;
      border-color: #FFFFFF;
    }
    
    .social-auth-btn.facebook-btn:hover {
      background: #1877F2;
      border-color: #1877F2;
    }
    
    .top-controls {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 15px;
      z-index: 100;
    }
    
    .top-controls .icon-btn {
      font-size: 1.2rem;
      cursor: pointer;
      background: none;
      border: none;
      color: #FFF;
      transition: color var(--transition-fast), transform var(--transition-fast);
    }
    
    .top-controls .icon-btn.rtl-toggle-btn {
      font-size: 0.9rem;
      font-weight: 700;
      font-family: var(--font-text);
    }
    
    .top-controls .icon-btn:hover {
      color: var(--accent-color) !important;
      transform: scale(1.1);
    }
    
    [dir="rtl"] .top-controls {
      right: auto;
      left: 20px;
    }
  </style>
</head>
<body>
  <div class="top-controls">
    <button class="icon-btn theme-toggle-btn" title="Toggle Dark/Light Mode" aria-label="Toggle Dark/Light Mode"><i class="fas fa-moon"></i></button>
    <button class="icon-btn rtl-toggle-btn" title="Toggle RTL" aria-label="Toggle RTL Layout">RTL</button>
  </div>
  <section class="signup-section">
    <div class="container">
      <div class="signup-box anim-zoom-in">
        <div class="text-center" style="margin-bottom: 30px;">
          <div style="margin-bottom: 25px;">
            <a href="index.html" style="display: inline-flex; flex-direction: column; align-items: center; text-decoration: none;">
              
              <div class="logo" style="font-size: 2.2rem; color: var(--text-color); font-weight: 800; font-family: var(--font-secondary); line-height: 1.2; letter-spacing: 1px;"><img src="images/favicon.svg" alt="TrekX Logo" class="brand-icon">Trek<span style="color: var(--accent-color);">X</span></div>
            </a>
          </div>
          <h2 class="section-title" style="margin-bottom: 10px;">Log In</h2>
          <p>Welcome back! Log in to access your adventure portal.</p>
        </div>
        
        <form id="auth-form" action="#" onsubmit="event.preventDefault(); handleAuthSubmit();">
          <div class="form-group signup-only" style="display: none;">
            <input type="text" class="form-control" placeholder="Full Name">
          </div>
          <div class="form-group">
            <input type="email" class="form-control" placeholder="Email Address" required>
          </div>
          <div class="form-group signup-only" style="display: none;">
            <input type="tel" class="form-control" placeholder="Phone Number">
          </div>
          <div class="form-group signup-only" style="position: relative; display: none;">
            <select class="form-control" style="-webkit-appearance: none; -moz-appearance: none; appearance: none; padding-right: 45px;">
              <option value="" disabled selected>Select Country</option>
              <option value="us">United States</option>
              <option value="uk">United Kingdom</option>
              <option value="ca">Canada</option>
              <option value="au">Australia</option>
              <option value="other">Other</option>
            </select>
            <i class="fas fa-chevron-down" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--text-light); pointer-events: none; z-index: 2;"></i>
          </div>
          <div class="form-group password-group" style="position: relative;">
            <input type="password" id="password" class="form-control password-input" placeholder="Password" required>
            <button type="button" class="password-toggle" onclick="togglePasswordVisibility('password', this)" aria-label="Toggle Password Visibility" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-light); cursor: pointer; transition: color var(--transition-fast);"><i class="fas fa-eye"></i></button>
          </div>
          <div class="form-group signup-only password-group" style="position: relative; display: none;">
            <input type="password" id="confirm-password" class="form-control password-input" placeholder="Confirm Password">
            <button type="button" class="password-toggle" onclick="togglePasswordVisibility('confirm-password', this)" aria-label="Toggle Password Visibility" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-light); cursor: pointer; transition: color var(--transition-fast);"><i class="fas fa-eye"></i></button>
          </div>
          
          <div class="form-group login-only" style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px; margin-bottom: 20px;">
            <label style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem; color: var(--text-light); cursor: pointer; user-select: none;">
              <input type="checkbox" id="remember-me" style="cursor: pointer; accent-color: var(--primary-color);">
              Remember me
            </label>
            <a href="#" style="font-size: 0.9rem; color: var(--accent-color); font-weight: 600;">Forgot Password?</a>
          </div>
          
          <div class="form-group signup-only" style="display: none; align-items: flex-start; gap: 10px; margin-top: 15px; margin-bottom: 20px;">
            <input type="checkbox" id="terms" style="margin-top: 4px; cursor: pointer; accent-color: var(--primary-color);">
            <label for="terms" style="font-size: 0.9rem; color: var(--text-light); line-height: 1.4; cursor: pointer; user-select: none;">
              I agree to the <a href="#" style="color: var(--accent-color); font-weight: 600;">Terms & Conditions</a> and <a href="#" style="color: var(--accent-color); font-weight: 600;">Privacy Policy</a>.
            </label>
          </div>
          
          <button type="submit" id="auth-submit-btn" class="btn btn-primary" style="width: 100%;">Log In</button>
          
          <div class="social-auth" style="margin-top: 25px; text-align: center; border-top: 1px solid var(--border-color); padding-top: 20px;">
            <p style="font-size: 0.9rem; color: var(--text-light); margin-bottom: 15px;">Or continue with</p>
            <div style="display: flex; justify-content: center; gap: 15px;">
              <a href="#" class="social-auth-btn google-btn" aria-label="Sign in with Google"><i class="fab fa-google"></i></a>
              <a href="#" class="social-auth-btn apple-btn" aria-label="Sign in with Apple"><i class="fab fa-apple"></i></a>
              <a href="#" class="social-auth-btn facebook-btn" aria-label="Sign in with Facebook"><i class="fab fa-facebook-f"></i></a>
            </div>
          </div>
          
          <div class="login-link">
            <span id="toggle-text">Don't have an account?</span> <a href="#" id="toggle-auth-btn" onclick="event.preventDefault(); toggleAuthMode();">Sign Up</a>
          </div>
        </form>
      </div>
    </div>
  </section>

  <script src="js/main.js"></script>
  <script src="js/animations.js"></script>
  <script>
    let isLoginMode = true;

    function togglePasswordVisibility(fieldId, btn) {
      const field = document.getElementById(fieldId);
      const icon = btn.querySelector('i');
      if (field.type === 'password') {
        field.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        field.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    }

    function toggleAuthMode() {
      isLoginMode = !isLoginMode;
      const signupBox = document.querySelector('.signup-box');
      const title = signupBox.querySelector('.section-title');
      const subtitle = signupBox.querySelector('p');
      const signupOnlyFields = signupBox.querySelectorAll('.signup-only');
      const loginOnlyFields = signupBox.querySelectorAll('.login-only');
      const submitBtn = document.getElementById('auth-submit-btn');
      const toggleText = document.getElementById('toggle-text');
      const toggleBtn = document.getElementById('toggle-auth-btn');

      if (isLoginMode) {
        title.textContent = 'Log In';
        subtitle.textContent = 'Welcome back! Log in to access your adventure portal.';
        signupOnlyFields.forEach(field => {
          field.style.display = 'none';
          const input = field.querySelector('input, select');
          if (input) input.removeAttribute('required');
        });
        loginOnlyFields.forEach(field => {
          field.style.display = 'flex';
        });
        submitBtn.textContent = 'Log In';
        toggleText.textContent = "Don't have an account?";
        toggleBtn.textContent = 'Sign Up';
      } else {
        title.textContent = 'Create Account';
        subtitle.textContent = 'Join the club and start your adventure today.';
        signupOnlyFields.forEach(field => {
          field.style.display = 'block';
          const input = field.querySelector('input, select');
          if (input) {
            input.setAttribute('required', '');
          }
        });
        loginOnlyFields.forEach(field => {
          field.style.display = 'none';
        });
        // Make sure confirmation password and terms checkbox are required
        document.getElementById('confirm-password').setAttribute('required', '');
        document.getElementById('terms').setAttribute('required', '');
        submitBtn.textContent = 'Register Now';
        toggleText.textContent = 'Already have an account?';
        toggleBtn.textContent = 'Log In';
      }
    }

    function handleAuthSubmit() {
      if (isLoginMode) {
        alert('Login Successful! Redirecting to home...');
        window.location.href = 'index.html';
      } else {
        alert('Registration Successful! Redirecting to home...');
        window.location.href = 'index.html';
      }
    }
  </script>
</body>
</html>
